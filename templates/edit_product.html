{% extends "base.html" %}
{% block title %}상품 수정{% endblock %}
{% block content %}
<h2>상품 수정</h2>
{% if product.image_name %}
  <p><img src="{{ url_for('product_image', product_id=product.id) }}"
          alt="현재 상품 사진" class="product-image"></p>
{% endif %}
<form method="post" enctype="multipart/form-data">
  <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
  상품명:
  <input type="text" name="title" maxlength="100" value="{{ product.title }}" required>
  설명:
  <textarea name="description" rows="4" maxlength="2000" required>{{ product.description }}</textarea>
  가격:
  <input type="number" name="price" min="0" max="1000000000" value="{{ product.price }}" required>
  상품 사진 <span class="muted">(선택 · 새로 올리면 기존 사진을 대체합니다)</span>:
  <input type="file" name="image" accept="image/jpeg,image/png,image/gif">
  <button type="submit">저장</button>
</form>
<p><a href="{{ url_for('my_products') }}">목록으로</a></p>
{% endblock %}
