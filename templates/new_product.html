{% extends "base.html" %}
{% block title %}새 상품 등록{% endblock %}
{% block content %}
<h2>상품 등록</h2>
<form method="post" enctype="multipart/form-data">
  <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
  제목:
  <input type="text" name="title" maxlength="100" required>
  설명:
  <textarea name="description" rows="4" maxlength="2000" required></textarea>
  가격:
  <input type="number" name="price" min="0" max="1000000000" required>
  상품 사진 <span class="muted">(선택 · JPG/PNG/GIF · 3MB 이하)</span>:
  <input type="file" name="image" accept="image/jpeg,image/png,image/gif">
  <button type="submit">등록하기</button>
</form>
{% endblock %}
